<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Chat WebUI · 深度思考可见</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://image.uc.cn/s/uae/g/3n/mos-production/fontawesome-free-7.1.0-web/js/all.min.js"></script>
    <link href="https://image.uc.cn/s/uae/g/3n/mos-production/fontawesome-free-7.1.0-web/css/fontawesome.min.css"
        rel="stylesheet" />
    <script src="https://image.uc.cn/s/uae/g/3n/mos-production/cdn-staticfile-net/axios/1.6.7/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* --- 滚动条优化 --- */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* --- 基础开关样式 --- */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #2563eb;
        }

        .toggle-checkbox:checked+.toggle-label {
            background-color: #2563eb;
        }

        /* --- 消息气泡与响应美化 --- */
        .message-bubble {
            word-wrap: break-word;
            word-break: break-word;
            overflow-wrap: break-word;
            min-width: 0;
        }

        /* --- 核心：Markdown 颜色优化 --- */
        .prose {
            color: #ffffff !important;
            max-width: none;
            line-height: 1.6;
        }

        .prose a {
            color: #60a5fa;
            text-decoration: underline;
        }

        .prose blockquote {
            border-left: 4px solid #3b82f6;
            background-color: #1e293b;
            color: #cbd5e1;
            padding: 0.5rem 1rem;
            margin: 1rem 0;
            font-style: italic;
        }

        .prose ul>li::marker,
        .prose ol>li::marker {
            color: #60a5fa;
        }

        .prose strong {
            color: #60a5fa;
            font-weight: 700;
        }

        .prose pre {
            background-color: #020617 !important;
            padding: 1.25em 1em;
            border-radius: 0.75rem;
            overflow-x: auto;
            margin: 1.2em 0;
            position: relative;
            border: 1px solid #334155;
        }

        .prose code {
            color: #fbbf24;
            background-color: #1e293b;
            padding: 0.2em 0.4em;
            border-radius: 0.25em;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.9em;
        }

        .prose pre code {
            background-color: transparent;
            padding: 0;
            color: #e2e8f0;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #1e293b;
            color: #94a3b8;
            border: 1px solid #334155;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            opacity: 0;
        }

        .prose pre:hover .copy-btn {
            opacity: 1;
        }

        .copy-btn:hover {
            background: #334155;
            color: #ffffff;
        }

        /* 深度思考区域样式 */
        .think-container {
            background: #0f172a;
            border-left: 4px solid #3b82f6;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            padding: 0.5rem 0.75rem;
            font-size: 0.8rem;
        }

        .think-summary {
            font-size: 0.75rem;
            font-weight: 500;
            color: #93c5fd;
            cursor: pointer;
            user-select: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .think-summary i {
            font-size: 0.7rem;
            transition: transform 0.2s;
        }

        details[open] .think-summary i {
            transform: rotate(90deg);
        }

        .think-steps {
            margin-top: 0.5rem;
            padding-left: 0.75rem;
            border-top: 1px solid #334155;
            padding-top: 0.5rem;
        }

        .think-step {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            color: #cbd5e6;
            line-height: 1.4;
        }

        .think-step-marker {
            font-weight: 600;
            color: #60a5fa;
            font-family: monospace;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #3498db;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast-enter {
            animation: slideIn 0.3s ease-out forwards;
        }

        /* 打字光标动画 */
        .typing-cursor::after {
            content: "▋";
            animation: blink 1s step-end infinite;
            margin-left: 2px;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* 设置表单样式 */
        .settings-group {
            background: #0f172a;
            border-radius: 0.75rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid #334155;
        }

        .settings-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 0.75rem;
        }

        .setting-row {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            margin-bottom: 1rem;
        }

        .setting-row label {
            font-size: 0.875rem;
            font-weight: 500;
            color: #e2e8f0;
        }

        .setting-row input,
        .setting-row textarea {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
            color: #f1f5f9;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .setting-row input:focus,
        .setting-row textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .setting-row input[type="checkbox"] {
            width: 1.25rem;
            height: 1.25rem;
            margin-right: 0.5rem;
            accent-color: #3b82f6;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
        }

        .setting-description {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 0.25rem;
        }
    </style>
</head>

<body class="bg-slate-900 text-slate-200 font-sans h-screen overflow-hidden flex flex-col">
    <div class="flex h-full" id="main-interface">
        <aside class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col flex-shrink-0">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center">
                <h2 class="font-bold text-lg text-white">Sessions</h2>
                <div class="flex gap-2">
                    <button class="text-blue-400 hover:text-blue-300 transition" id="new-session-btn"
                        title="New Session">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-2 space-y-1" id="session-list"></div>
            <div class="p-4 border-t border-slate-700">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium text-white truncate" id="current-user-display">Local User</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-slate-900 overflow-hidden">
            <header
                class="h-14 bg-slate-800 border-b border-slate-700 flex items-center justify-between px-4 flex-shrink-0 z-40">
                <div class="relative inline-block text-left">
                    <button type="button" id="model-dropdown-btn"
                        class="flex items-center space-x-2 px-2 py-1 rounded hover:bg-slate-700 transition-colors focus:outline-none">
                        <span class="w-2 h-2 rounded-full bg-slate-500" id="connection-status-dot"></span>
                        <span class="text-sm text-slate-300" id="model-name-display">Model: Loading...</span>
                        <i class="fa-solid fa-chevron-down text-xs text-slate-400 ml-1"></i>
                    </button>
                    <div id="model-dropdown-menu"
                        class="absolute left-0 mt-2 w-56 rounded-md shadow-lg bg-slate-800 border border-slate-700 hidden z-50">
                        <div class="py-1 max-h-60 overflow-y-auto" id="model-dropdown-list"></div>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex gap-3">
                        <button class="text-purple-400 hover:text-purple-300 transition" id="summary-session-btn"
                            title="Generate Memory Summary">
                            <i class="fa-solid fa-brain"></i>
                        </button>
                        <button class="text-red-400 hover:text-red-300 transition" id="clear-session-btn"
                            title="Clear Current Session Context">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                    <div class="text-xs text-slate-500 border-l border-slate-600 pl-4" id="current-session-id-display">
                        Session: -</div>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-4 space-y-4" id="messages-container">
                <div class="flex justify-center mt-10">
                    <div class="text-center text-slate-500">
                        <i class="fa-solid fa-brain text-4xl mb-3 opacity-50"></i>
                        <p>WebUI Powered by Yauntyours</p>
                    </div>
                </div>
            </div>

            <div class="p-4 bg-slate-800 border-t border-slate-700 flex-shrink-0">
                <div
                    class="bg-slate-900 rounded-lg border border-slate-700 focus-within:border-blue-600 transition flex flex-col">
                    <div id="image-preview-container" class="flex flex-wrap gap-2 px-3 pt-2 hidden"></div>
                    <div class="relative flex items-center p-1">
                        <button class="text-slate-400 hover:text-blue-400 p-2 rounded transition ml-1" id="attach-btn"
                            title="上传文件 (图片/文本)">
                            <i class="fa-solid fa-paperclip text-lg"></i>
                        </button>
                        <input type="file" id="file-upload" class="hidden" multiple>
                        <textarea
                            class="flex-1 bg-transparent text-white p-2 resize-none focus:outline-none max-h-48 overflow-y-auto"
                            id="user-input" placeholder="输入消息... (支持上传文本与图像, 切换会话可以重置会话上下文)" rows="1"></textarea>
                        <button class="text-blue-500 hover:text-blue-400 p-2 rounded transition mr-1" id="send-btn"
                            title="send-btn">
                            <i class="fa-solid fa-paper-plane text-xl"></i>
                        </button>
                    </div>
                </div>

                <div class="flex justify-between items-center mt-2 px-1">
                    <div class="flex items-center">
                        <div
                            class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                            <input
                                class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer border-slate-300 transition-all duration-300 left-0 top-0"
                                id="think-toggle" name="toggle" type="checkbox">
                            <label
                                class="toggle-label block overflow-hidden h-5 rounded-full bg-slate-600 cursor-pointer transition-colors duration-300"
                                for="think-toggle"></label>
                        </div>
                        <span class="text-xs text-slate-400">Deep Think</span>
                    </div>
                    <div class="text-xs text-slate-500" id="input-hint">↵ 发送消息</div>
                </div>
            </div>
        </main>

        <aside class="w-80 bg-slate-800 border-l border-slate-700 flex flex-col flex-shrink-0">
            <div class="flex border-b border-slate-700">
                <button
                    class="flex-1 py-3 text-sm font-medium text-blue-400 border-b-2 border-blue-500 focus:outline-none hover:bg-slate-700 transition tab-btn"
                    data-tab="settings">Settings</button>
                <button
                    class="flex-1 py-3 text-sm font-medium text-slate-400 hover:text-slate-200 focus:outline-none hover:bg-slate-700 transition tab-btn"
                    data-tab="tools">Tools</button>
                <button
                    class="flex-1 py-3 text-sm font-medium text-slate-400 hover:text-slate-200 focus:outline-none hover:bg-slate-700 transition tab-btn"
                    data-tab="todos">Todos</button>
                <button
                    class="flex-1 py-3 text-sm font-medium text-slate-400 hover:text-slate-200 focus:outline-none hover:bg-slate-700 transition tab-btn"
                    data-tab="channels">Channels</button>
            </div>
            <div class="tab-content flex-1 overflow-y-auto p-4" id="tab-settings">
                <!-- 动态设置表单将渲染在此处 -->
                <div id="settings-form-container"></div>
                <div class="mt-4">
                    <button id="save-settings-btn"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-floppy-disk"></i> 保存所有设置
                    </button>
                </div>
                <div class="mt-6">
                    <h3 class="text-sm font-bold text-white uppercase tracking-wider mb-3">System Logs</h3>
                    <div class="bg-slate-900 p-2 rounded h-48 overflow-y-auto text-xs font-mono text-slate-400 space-y-1"
                        id="system-logs">
                        <div class="text-green-500">[System] UI Initialized</div>
                    </div>
                </div>
            </div>
            <div class="tab-content flex-1 overflow-y-auto p-4 hidden" id="tab-tools">
                <div class="space-y-3" id="tools-list"></div>
            </div>
            <div class="tab-content flex-1 overflow-y-auto p-4 hidden flex flex-col" id="tab-todos">
                <div class="flex mb-4">
                    <input
                        class="flex-1 bg-slate-900 border border-slate-700 rounded-l px-3 py-1.5 text-sm text-white focus:outline-none focus:border-blue-600"
                        id="new-todo-input" placeholder="Add new todo..." type="text" />
                    <button class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-r text-sm transition"
                        id="add-todo-btn" title="add-todo-btn">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
                <div class="space-y-2 flex-1" id="todos-list"></div>
            </div>
            <div class="tab-content flex-1 overflow-y-auto p-4 hidden" id="tab-channels">
                <div class="space-y-2" id="channels-list"></div>
            </div>
        </aside>
    </div>

    <div class="fixed top-5 right-5 z-50 flex flex-col space-y-3" id="toast-container"></div>

    <script>
        // --- State Management ---
        const state = {
            user: "Local User",
            sessions: [],
            currentSessionId: null,
            messages: [],
            settings: {},
            models: [],
            currentModel: null,
            thinkMode: false,
            activeTab: 'settings',
            tools: [],
            todos: [],
            channels: [],
            isTyping: false,
            pendingImages: [],
        };

        const API_BASE = '/api';

        // --- DOM Elements ---
        const els = {
            mainInterface: document.getElementById('main-interface'),
            sessionList: document.getElementById('session-list'),
            newSessionBtn: document.getElementById('new-session-btn'),
            clearSessionBtn: document.getElementById('clear-session-btn'),
            summarySessionBtn: document.getElementById('summary-session-btn'),
            messagesContainer: document.getElementById('messages-container'),
            userInput: document.getElementById('user-input'),
            sendBtn: document.getElementById('send-btn'),
            thinkToggle: document.getElementById('think-toggle'),
            tabBtns: document.querySelectorAll('.tab-btn'),
            tabContents: document.querySelectorAll('.tab-content'),
            currentUserDisplay: document.getElementById('current-user-display'),
            systemLogs: document.getElementById('system-logs'),
            toolsList: document.getElementById('tools-list'),
            todosList: document.getElementById('todos-list'),
            newTodoInput: document.getElementById('new-todo-input'),
            addTodoBtn: document.getElementById('add-todo-btn'),
            channelsList: document.getElementById('channels-list'),
            currentSessionIdDisplay: document.getElementById('current-session-id-display'),
            modelDropdownBtn: document.getElementById('model-dropdown-btn'),
            modelDropdownMenu: document.getElementById('model-dropdown-menu'),
            modelDropdownList: document.getElementById('model-dropdown-list'),
            modelNameDisplay: document.getElementById('model-name-display'),
            connectionStatusDot: document.getElementById('connection-status-dot'),
            attachBtn: document.getElementById('attach-btn'),
            fileUpload: document.getElementById('file-upload'),
            imagePreviewContainer: document.getElementById('image-preview-container'),
            settingsFormContainer: document.getElementById('settings-form-container'),
            saveSettingsBtn: document.getElementById('save-settings-btn')
        };

        // --- Utilities ---
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            let icon = '<i class="fa-solid fa-circle-info text-blue-400"></i>';
            if (type === 'success') icon = '<i class="fa-solid fa-circle-check text-green-400"></i>';
            else if (type === 'error') icon = '<i class="fa-solid fa-circle-exclamation text-red-400"></i>';

            toast.className = `bg-slate-700 text-white px-4 py-3 rounded shadow-lg flex items-center space-x-3 min-w-[300px] toast-enter border border-slate-600`;
            toast.innerHTML = `${icon}<span class="text-sm font-medium">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease-in';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function log(msg, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.textContent = `[${time}] ${msg}`;
            div.className = type === 'error' ? 'text-red-400' : (type === 'success' ? 'text-green-400' : 'text-slate-400');
            els.systemLogs.appendChild(div);
            els.systemLogs.scrollTop = els.systemLogs.scrollHeight;
        }

        function attachCopyButtons(container) {
            if (!container) return;
            const preBlocks = container.querySelectorAll('pre');
            preBlocks.forEach(pre => {
                if (pre.querySelector('.copy-btn')) return;
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.innerText = 'Copy';
                btn.onclick = () => {
                    const code = pre.querySelector('code')?.innerText || '';
                    navigator.clipboard.writeText(code).then(() => {
                        btn.innerText = 'Copied!';
                        btn.classList.add('text-green-400');
                        setTimeout(() => {
                            btn.innerText = 'Copy';
                            btn.classList.remove('text-green-400');
                        }, 2000);
                    });
                };
                pre.appendChild(btn);
            });
        }

        function renderFixCodeBlock(text) {
            if (!text) return text;
            let output = text.replace(/<cs>([\s\S]*?)<\/cs>/g, function (match, codeContent) {
                return '```yaml\n' + codeContent + '\n```';
            });
            output = output.replace(/<tool>([\s\S]*?)<\/tool>/g, function (match, codeContent) {
                return '```yaml\n' + codeContent + '\n```';
            });
            return output;
        }

        // --- 动态渲染设置表单 ---
        function renderSettingsForm(settings) {
            if (!els.settingsFormContainer) return;

            const formHtml = `
                <div class="settings-group">
                    <div class="settings-label">⚙️ 基本设置</div>
                    <div class="setting-row">
                        <label>用户名 (name)</label>
                        <input type="text" id="setting-name" value="${escapeHtml(settings.name || '')}" placeholder="用户名">
                        <div class="setting-description">用于标识当前用户</div>
                    </div>
                    <div class="setting-row">
                        <label>Agent 昵称 (agent_nickname)</label>
                        <input type="text" id="setting-agent_nickname" value="${escapeHtml(settings.agent_nickname || '')}" placeholder="Agent 昵称">
                        <div class="setting-description">AI 助手的显示名称</div>
                    </div>
                    <div class="setting-row">
                        <label>工作目录 (workspace)</label>
                        <input type="text" id="setting-workspace" value="${escapeHtml(settings.workspace || '')}" placeholder="工作目录">
                        <div class="setting-description">文件操作的基础路径</div>
                    </div>
                    <div class="setting-row">
                        <label>服务器地址 (server_address)</label>
                        <input type="text" id="setting-server_address" value="${escapeHtml(settings.server_address || '')}" placeholder="http://localhost:11434">
                        <div class="setting-description">Ollama API 服务地址</div>
                    </div>
                    <div class="setting-row">
                        <label>默认模型 (model)</label>
                        <input type="text" id="setting-model" value="${escapeHtml(settings.model || '')}" placeholder="模型名称">
                        <div class="setting-description">对话使用的默认模型</div>
                    </div>
                    <div class="setting-row">
                        <label>提示词路径 (prompt_path)</label>
                        <input type="text" id="setting-prompt_path" value="${escapeHtml(settings.prompt_path || '')}" placeholder="agent.txt">
                        <div class="setting-description">系统提示词文件路径</div>
                    </div>
                </div>

                <div class="settings-group">
                    <div class="settings-label">🎛️ 运行参数</div>
                    <div class="setting-row checkbox-wrapper">
                        <input type="checkbox" id="setting-stream" ${settings.stream ? 'checked' : ''}>
                        <label>流式响应 (stream)</label>
                    </div>
                    <div class="setting-row">
                        <label>最大 MPC 轮次 (max_mpc_rounds)</label>
                        <input type="number" id="setting-max_mpc_rounds" value="${settings.max_mpc_rounds || 10}" min="1" max="50">
                        <div class="setting-description">工具/命令调用的最大循环次数</div>
                    </div>
                    <div class="setting-row">
                        <label>最大上下文长度 (max_context)</label>
                        <input type="number" id="setting-max_context" value="${settings.max_context || 128000}" min="1000" max="1000000">
                        <div class="setting-description">触发记忆压缩的上下文 token 阈值</div>
                    </div>
                </div>

                <div class="settings-group">
                    <div class="settings-label">📡 频道配置 (channels)</div>
                    <div class="setting-row">
                        <label>频道列表 (JSON 格式)</label>
                        <textarea id="setting-channels" rows="6" class="font-mono text-sm">${escapeHtml(JSON.stringify(settings.channels || [], null, 2))}</textarea>
                        <div class="setting-description">编辑 channels 数组，请确保 JSON 格式正确</div>
                    </div>
                </div>
            `;

            els.settingsFormContainer.innerHTML = formHtml;
        }

        // --- 收集表单中的设置值 ---
        function collectSettingsFromForm() {
            let channels = [];
            try {
                const channelsRaw = document.getElementById('setting-channels')?.value || '[]';
                channels = JSON.parse(channelsRaw);
            } catch (e) {
                console.warn('Channels JSON 解析失败', e);
                channels = state.settings.channels;
            }

            return {
                name: document.getElementById('setting-name')?.value || '',
                agent_nickname: document.getElementById('setting-agent_nickname')?.value || '',
                workspace: document.getElementById('setting-workspace')?.value || '',
                server_address: document.getElementById('setting-server_address')?.value || '',
                model: document.getElementById('setting-model')?.value || '',
                prompt_path: document.getElementById('setting-prompt_path')?.value || '',
                stream: document.getElementById('setting-stream')?.checked || false,
                max_mpc_rounds: parseInt(document.getElementById('setting-max_mpc_rounds')?.value) || 10,
                max_context: parseInt(document.getElementById('setting-max_context')?.value) || 128000,
                channels: channels
            };
        }

        // --- 保存设置到后端 ---
        async function saveSettings() {
            const newSettings = collectSettingsFromForm();
            state.settings = newSettings;

            try {
                const response = await api.post('/settings', { updata: true, settings: state.settings });
                if (response.status === 200) {
                    state.settings = response.data;
                    showToast('设置已保存 (部分设置需重启服务生效)', 'success');
                    log('设置已保存: ' + JSON.stringify({ stream: newSettings.stream, model: newSettings.model }), 'success');
                } else {
                    throw new Error('保存失败');
                }
            } catch (error) {
                console.error('保存设置失败:', error);
                showToast('保存设置失败: ' + (error.response?.data?.error || error.message), 'error');
                log('保存设置失败: ' + (error.response?.data?.error || error.message), 'error');
            }
            // 如果修改了模型，更新当前选中的模型显示
            if (newSettings.model && newSettings.model !== state.currentModel) {
                state.currentModel = newSettings.model;
                els.modelNameDisplay.textContent = `Model: ${newSettings.model}`;
            }
        }

        // --- 加载完整配置 (从后端获取) ---
        async function loadSettings() {
            try {
                const response = await api.post('/settings', { updata: false });
                if (response.status === 200) {
                    state.settings = response.data;
                    showToast('设置加载成功', 'success');
                    log('已从服务器加载配置文件', 'success');
                } else {
                    throw new Error('设置加载失败');
                }
            } catch (e) {
                showToast('设置加载失败: ' + (error.response?.data?.error || error.message), 'error');
                log('设置加载失败: ' + (error.response?.data?.error || error.message), 'error');
            }

            // 渲染表单
            renderSettingsForm(state.settings);
        }

        // --- 文件上传与图片处理 (保持不变) ---
        els.attachBtn.onclick = () => els.fileUpload.click();

        function compressImage(file, maxResolution = 1024, quality = 0.7) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;

                        if (width > maxResolution || height > maxResolution) {
                            if (width > height) {
                                height = Math.round((height * maxResolution) / width);
                                width = maxResolution;
                            } else {
                                width = Math.round((width * maxResolution) / height);
                                height = maxResolution;
                            }
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        const compressedBase64 = canvas.toDataURL('image/jpeg', quality);
                        resolve(compressedBase64);
                    };
                    img.onerror = error => reject(error);
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        els.fileUpload.onchange = async (e) => {
            const files = e.target.files;
            if (!files.length) return;

            for (const file of files) {
                if (file.type.startsWith('image/')) {
                    try {
                        const compressedBase64 = await compressImage(file, 1024, 0.7);
                        state.pendingImages.push(compressedBase64);
                        renderImagePreviews();
                    } catch (err) {
                        console.error("图像压缩失败:", err);
                        showToast("图像处理失败", "error");
                    }
                } else {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const text = event.target.result;
                        const prefix = els.userInput.value.trim() ? '\n\n' : '';
                        els.userInput.value += prefix + `[File: ${file.name}]\n` + text;
                        els.userInput.scrollTop = els.userInput.scrollHeight;
                    };
                    reader.readAsText(file);
                }
            }
            els.fileUpload.value = '';
        };

        function renderImagePreviews() {
            if (state.pendingImages.length === 0) {
                els.imagePreviewContainer.classList.add('hidden');
                els.imagePreviewContainer.innerHTML = '';
                return;
            }
            els.imagePreviewContainer.classList.remove('hidden');
            els.imagePreviewContainer.innerHTML = state.pendingImages.map((img, index) => `
                <div class="relative group mt-2 mb-2">
                    <img src="${img}" class="w-16 h-16 object-cover rounded border border-slate-600">
                    <button class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100 transition" onclick="window.removePendingImage(${index})">
                        <i class="fa-solid fa-times"></i>
                    </button>
                </div>
            `).join('');
        }

        window.removePendingImage = (index) => {
            state.pendingImages.splice(index, 1);
            renderImagePreviews();
        };

        // --- API Service ---
        const api = axios.create({ baseURL: API_BASE, headers: { 'Content-Type': 'application/json' } });

        // --- 消息渲染函数 (与原有逻辑保持一致，略作简化但保留核心功能) ---
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function addMessageToUI(role, content, id = null, images = []) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            if (id) div.id = `msg-${id}`;
            const emoji = role === 'user' ? '⭐' : '💖';
            const bubbleClass = role === 'user' ? 'bg-blue-600 text-white' : 'bg-slate-800 border border-slate-700 text-slate-200';
            const innerContent = role === 'user' ? escapeHtml(content).replace(/\n/g, '<br>') : marked.parse(renderFixCodeBlock(content));

            let imagesHtml = '';
            if (images && images.length > 0) {
                imagesHtml = `<div class="flex flex-wrap gap-2 mt-2 pt-2 border-t ${role === 'user' ? 'border-blue-500' : 'border-slate-700'}">` +
                    images.map(img => `<img src="${img.startsWith('data:') ? img : 'data:image/jpeg;base64,' + img}" class="max-w-xs max-h-64 object-contain rounded border border-slate-600 cursor-pointer" onclick="window.open(this.src)">`).join('') +
                    `</div>`;
            }

            div.innerHTML = `
                <div class="flex max-w-[85%] ${role === 'user' ? 'flex-row-reverse space-x-reverse' : 'flex-row'} items-start space-x-3 min-w-0">
                    <div class="w-8 h-8 rounded flex-shrink-0 flex items-center justify-center ${role === 'user' ? 'bg-blue-500' : 'bg-slate-700'} text-lg">
                        ${emoji}
                    </div>
                    <div class="${bubbleClass} px-4 py-2 rounded-lg shadow-md message-bubble overflow-hidden">
                        <div class="prose prose-sm text-white">${innerContent}</div>
                        ${imagesHtml}
                    </div>
                </div>
            `;
            els.messagesContainer.appendChild(div);
            els.messagesContainer.scrollTop = els.messagesContainer.scrollHeight;
            if (role === 'ai' && !id) attachCopyButtons(div.querySelector('.prose'));
        }

        // 简化版消息更新函数 (保留原有接口)
        function updateAiMessageWithThink(messageId, responseContent, thinkArray, useStream = false, aiImages = []) {
            const msgContainer = document.getElementById(`msg-${messageId}`);
            if (!msgContainer) return;
            const proseDiv = msgContainer.querySelector('.prose');
            if (proseDiv) {
                proseDiv.innerHTML = marked.parse(renderFixCodeBlock(responseContent));
                attachCopyButtons(proseDiv);
            }
        }

        // --- 核心 API 调用函数 ---
        async function sendMessage() {
            const content = els.userInput.value.trim();
            const imagesToSend = [...state.pendingImages];
            if (!state.currentSessionId) {
                showToast('会话未选择！', 'error');
            }

            if ((!content && imagesToSend.length === 0) || state.isTyping || !state.currentSessionId) return;

            addMessageToUI('user', content, null, imagesToSend);
            els.userInput.value = '';
            state.pendingImages = [];
            renderImagePreviews();
            state.isTyping = true;

            const aiMessageId = Date.now();
            addMessageToUI('ai', '<span class="typing-cursor">Thinking...</span>', aiMessageId);

            try {
                const payload = {
                    messages: content,
                    model: state.currentModel,
                    think: state.thinkMode
                };
                if (imagesToSend.length > 0) payload.images = imagesToSend;

                const res = await api.post('/input', payload);
                let responseContent = '';
                let thinkArray = [];
                let aiImages = [];

                if (res.data && Array.isArray(res.data.messages)) {
                    for (const item of res.data.messages) {
                        if (item.type === 'response') responseContent = item.content || '';
                        else if (item.type === 'think') {
                            let raw = item.content;
                            if (Array.isArray(raw)) thinkArray = raw;
                            else if (typeof raw === 'string') thinkArray = [raw];
                        }
                        else if (item.type === 'images') {
                            let raw = item.content;
                            if (Array.isArray(raw)) aiImages = raw;
                        }
                    }
                } else if (res.data && res.data.messages && res.data.messages[0] && res.data.messages[0].content) {
                    responseContent = res.data.messages[0].content;
                } else {
                    responseContent = "无法解析响应格式";
                }

                state.messages.push({ role: 'ai', content: responseContent, images: aiImages });
                updateAiMessageWithThink(aiMessageId, responseContent, thinkArray, state.settings.stream, aiImages);
                log(`AI响应完成，思考步骤: ${thinkArray.length}步`, 'success');
            } catch (error) {
                console.error(error);
                const errorMsg = error.response?.data?.error || '请求失败';
                const msgDiv = document.getElementById(`msg-${aiMessageId}`);
                if (msgDiv) {
                    const prose = msgDiv.querySelector('.prose');
                    if (prose) prose.innerHTML = `<span class="text-red-400">❌ ${escapeHtml(errorMsg)}</span>`;
                }
                log(`发送失败: ${errorMsg}`, 'error');
            } finally {
                state.isTyping = false;
            }
        }

        // --- 会话管理函数 (简化保留) ---
        async function loadSessions() {
            try {
                const res = await api.get('/session');
                state.sessions = res.data.session_list || [];
                renderSessions();
            } catch (e) { log('加载会话失败', 'error'); }
        }

        function renderSessions() {
            els.sessionList.innerHTML = '';
            state.sessions.forEach(id => {
                const isActive = id === state.currentSessionId;
                const div = document.createElement('div');
                div.className = `p-3 rounded cursor-pointer flex justify-between items-center group ${isActive ? 'bg-blue-600 text-white' : 'hover:bg-slate-700 text-slate-300'}`;
                div.onclick = () => switchSession(id);
                div.innerHTML = `<div class="truncate text-sm font-medium">${id}</div>`;
                els.sessionList.appendChild(div);
            });
        }

        async function switchSession(id) {
            try {
                const res = await api.post('/session/set', { session_id: id });
                state.currentSessionId = id;
                els.currentSessionIdDisplay.textContent = `Session: ${id}`;
                state.messages = (res.data.messages || []).map(m => ({ role: m.startsWith('User') ? 'user' : 'ai', content: m, images: [] }));
                els.messagesContainer.innerHTML = '';
                if (!state.messages.length) {
                    const emptyDiv = document.createElement('div');
                    emptyDiv.className = 'flex justify-center mt-10';
                    emptyDiv.innerHTML = `<div class="text-center text-slate-500"><i class="fa-solid fa-comment-dots text-4xl mb-3 opacity-50"></i><p>会话已切换，开始新对话吧 ✨</p></div>`;
                    els.messagesContainer.appendChild(emptyDiv);
                } else {
                    state.messages.forEach(m => addMessageToUI(m.role, m.content));
                }
            } catch (e) { log('切换会话失败', 'error'); }
        }

        async function newSession() {
            try {
                const res = await api.post('/new');
                if (res.data.status === 'OK') {
                    state.sessions.push(res.data.session_id);
                    await switchSession(res.data.session_id);
                    renderSessions();
                }
            } catch (e) { log('新建会话失败', 'error'); }
        }

        async function clearCurrentSession() {
            if (!state.currentSessionId) return;
            if (!confirm("⚠️ 确定清除当前会话的上下文吗？")) return;
            try {
                await api.post('/clear');
                await switchSession(state.currentSessionId);
                showToast("会话上下文已清除", "success");
            } catch (error) {
                showToast("清除失败", "error");
            }
        }

        async function generateSessionSummary() {
            if (!state.currentSessionId) return;
            if (!confirm("🧠 确定要为当前会话生成记忆摘要吗？")) return;
            const btn = els.summarySessionBtn;
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            btn.disabled = true;
            try {
                const res = await api.post('/session/memory');
                if (res.data.status === 'done') showToast("✅ 记忆摘要生成成功", "success");
                else throw new Error("生成失败");
            } catch (error) {
                showToast("生成摘要失败", "error");
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        }

        async function getModels() {
            try {
                const response = await api.get('/models');
                state.models = (response.data.data || []).map(m => ({
                    name: m.aliases?.[0] || m.id,
                    available: m.status?.value === 'loaded',
                }));
                renderModels();
            } catch (error) { log('Failed to load models', 'error'); }
        }

        function renderModels() {
            els.modelDropdownList.innerHTML = '';
            if (!state.currentModel && state.models.length > 0) {
                selectModel(state.models[0].name, state.models[0].available !== false);
            }
            state.models.forEach(model => {
                const isAvailable = model.available !== false;
                const btn = document.createElement('button');
                btn.className = `w-full flex items-center space-x-2 px-4 py-2 text-sm ${isAvailable ? 'text-slate-300 hover:bg-slate-700' : 'text-slate-500 cursor-not-allowed'}`;
                btn.onclick = () => isAvailable && (selectModel(model.name, true), els.modelDropdownMenu.classList.add('hidden'));
                btn.innerHTML = `<span class="w-2 h-2 rounded-full ${isAvailable ? 'bg-green-500' : 'bg-red-500'}"></span><span>${model.name}</span>`;
                els.modelDropdownList.appendChild(btn);
            });
        }

        function selectModel(name, ok) {
            state.currentModel = name;
            els.modelNameDisplay.textContent = `Model: ${name}`;
            els.connectionStatusDot.className = `w-2 h-2 rounded-full ${ok ? 'bg-green-500' : 'bg-red-500'}`;
        }

        async function loadTools() { try { const res = await api.get('/tools'); state.tools = res.data || []; renderTools(); } catch (e) { } }
        function renderTools() { els.toolsList.innerHTML = state.tools.map(t => `<div class="bg-slate-900 p-2 rounded border border-slate-700"><div class="text-blue-400 text-sm">${t.name}</div><div class="text-xs text-slate-500">${t.description}</div></div>`).join(''); }
        async function loadTodos() { try { const res = await api.get('/todos'); state.todos = res.data || []; renderTodos(); } catch (e) { } }
        window.deleteTodo = async function (id) { if (!confirm('删除待办?')) return; await api.get(`/todos/delete/${id}`); state.todos = state.todos.filter(t => t.id != id); renderTodos(); };
        window.doneTodo = async function (id, isDone) { const todo = state.todos.find(t => t.id == id); if (todo) { todo.done = !isDone; await api.post(`/todos/${id}`, todo); renderTodos(); } };
        els.addTodoBtn.onclick = async () => { if (!els.newTodoInput.value.trim()) return; const res = await api.post('/todos/new', { id: String(Date.now()), done: false, content: els.newTodoInput.value }); state.todos.push(res.data); renderTodos(); els.newTodoInput.value = ''; };
        function renderTodos() {
            if (!state.todos?.length) { els.todosList.innerHTML = '<div class="text-gray-500 text-sm p-4 text-center">暂无待办</div>'; return; }
            els.todosList.innerHTML = state.todos.map(t => `<div class="flex items-center justify-between bg-slate-900 p-3 rounded-lg text-sm mb-2 border border-slate-800"><div class="flex items-center gap-3 flex-1 cursor-pointer" onclick="doneTodo(${t.id}, ${t.done})"><div class="w-5 h-5 rounded border flex items-center justify-center ${t.done ? 'bg-green-600 border-green-600' : 'border-gray-500'}">${t.done ? '<svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>' : ''}</div><p class="text-gray-300 truncate ${t.done ? 'line-through opacity-60' : ''}">${escapeHtml(t.content)}</p></div><button onclick="event.stopPropagation(); deleteTodo(${t.id})" class="bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white px-3 py-1 rounded text-xs">删除</button></div>`).join('');
        }
        async function loadChannels() { try { const res = await api.get('/channels'); state.channels = res.data || []; renderChannels(); } catch (e) { } }
        function renderChannels() { els.channelsList.innerHTML = state.channels.map(c => `<div class="p-2 hover:bg-slate-700 rounded cursor-pointer text-sm"># ${c.name}</div>`).join(''); }

        // --- 初始化应用 ---
        async function init() {
            els.currentUserDisplay.textContent = state.user;
            await loadSettings();      // 加载配置并渲染设置表单
            await getModels();
            await loadSessions();
            await loadTools();
            await loadTodos();
            await loadChannels();

            // 绑定保存按钮事件
            if (els.saveSettingsBtn) {
                els.saveSettingsBtn.onclick = saveSettings;
            }
        }

        // --- 事件绑定 ---
        els.thinkToggle.onchange = (e) => state.thinkMode = e.target.checked;
        els.newSessionBtn.onclick = newSession;
        els.clearSessionBtn.onclick = clearCurrentSession;
        els.summarySessionBtn.onclick = generateSessionSummary;
        els.tabBtns.forEach(btn => {
            btn.onclick = () => {
                els.tabBtns.forEach(b => b.classList.replace('text-blue-400', 'text-slate-400'));
                btn.classList.replace('text-slate-400', 'text-blue-400');
                els.tabContents.forEach(c => c.classList.add('hidden'));
                document.getElementById(`tab-${btn.dataset.tab}`).classList.remove('hidden');
            };
        });
        els.userInput.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
        els.sendBtn.onclick = sendMessage;
        els.modelDropdownBtn.onclick = (e) => { e.stopPropagation(); els.modelDropdownMenu.classList.toggle('hidden'); };
        document.onclick = () => els.modelDropdownMenu.classList.add('hidden');

        // 启动应用
        init();
    </script>
</body>

</html>
