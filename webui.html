<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Loading</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://image.uc.cn/s/uae/g/3n/mos-production/fontawesome-free-7.1.0-web/js/all.min.js"></script>
    <link href="https://image.uc.cn/s/uae/g/3n/mos-production/fontawesome-free-7.1.0-web/css/fontawesome.min.css"
        rel="stylesheet" />
    <script src="https://image.uc.cn/s/uae/g/3n/mos-production/cdn-staticfile-net/axios/1.6.7/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg-base: #09090b;
            --bg-panel: #121214;
            --bg-surface: #18181b;
            --border-color: #27272a;
            --border-hover: #3f3f46;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --text-main: #e4e4e7;
            --text-muted: #a1a1aa;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* 优雅的滚动条 */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 8px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-hover);
        }

        /* 毛玻璃与通用容器质感 */
        .glass-panel {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
        }

        .input-container {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        .input-container:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 4px 24px -2px rgba(99, 102, 241, 0.2);
        }

        /* Toggle 按钮 */
        .toggle-checkbox:checked {
            right: 0;
            border-color: var(--accent-color);
        }

        .toggle-checkbox:checked+.toggle-label {
            background-color: var(--accent-color);
        }

        /* 消息气泡优化 */
        .message-bubble {
            word-wrap: break-word;
            word-break: break-word;
            overflow-wrap: break-word;
            min-width: 0;
            box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s ease;
        }

        .prose {
            color: var(--text-main) !important;
            max-width: none;
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .prose a {
            color: #818cf8;
            text-decoration: none;
            transition: all 0.2s;
        }

        .prose a:hover {
            text-shadow: 0 0 8px rgba(129, 140, 248, 0.4);
        }

        .prose blockquote {
            border-left: 3px solid var(--accent-color);
            background-color: var(--bg-panel);
            color: var(--text-muted);
            padding: 0.85rem 1.25rem;
            margin: 1rem 0;
            border-radius: 0 0.5rem 0.5rem 0;
            font-style: italic;
        }

        .prose pre {
            background-color: var(--bg-panel) !important;
            padding: 1.25em;
            border-radius: 0.75rem;
            overflow-x: auto;
            margin: 1.2em 0;
            position: relative;
            border: 1px solid var(--border-color);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .prose code {
            color: #fca5a5;
            background-color: rgba(252, 165, 165, 0.1);
            padding: 0.2em 0.4em;
            border-radius: 0.3em;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
        }

        .prose pre code {
            background-color: transparent;
            padding: 0;
            color: #d4d4d8;
        }

        .copy-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--bg-surface);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s ease;
            opacity: 0;
            font-family: 'Inter', sans-serif;
            backdrop-filter: blur(4px);
        }

        .prose pre:hover .copy-btn {
            opacity: 1;
        }

        .copy-btn:hover {
            background: var(--border-hover);
            color: white;
        }

        /* 深度思考模块优化 */
        .think-container {
            background: var(--bg-panel);
            border-left: 3px solid #8b5cf6;
            border-radius: 0.75rem;
            margin-bottom: 1.25rem;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .think-summary {
            padding: 0.85rem 1rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #c4b5fd;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(139, 92, 246, 0.05);
            transition: background 0.2s;
        }

        .think-summary:hover {
            background: rgba(139, 92, 246, 0.15);
        }

        .think-summary::-webkit-details-marker {
            display: none;
        }

        .think-summary i {
            font-size: 0.7rem;
            transition: transform 0.3s ease;
        }

        details[open] .think-summary i {
            transform: rotate(90deg);
        }

        .think-steps {
            padding: 0 1.2rem 1.2rem 1.2rem;
            font-size: 0.85rem;
        }

        .think-step {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.85rem;
            color: #a1a1aa;
            line-height: 1.6;
        }

        .think-step-marker {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
            padding: 0.15rem 0.4rem;
            border-radius: 0.3rem;
            height: fit-content;
        }

        /* 动画效果 */
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast-enter {
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .typing-cursor::after {
            content: "▋";
            animation: blink 1s step-end infinite;
            margin-left: 4px;
            color: var(--accent-color);
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* 配置面板样式 */
        .settings-group {
            background: var(--bg-surface);
            border-radius: 0.75rem;
            padding: 1.25rem;
            margin-bottom: 1.25rem;
            border: 1px solid var(--border-color);
        }

        .settings-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .setting-row {
            margin-bottom: 1rem;
        }

        .setting-row:last-child {
            margin-bottom: 0;
        }

        .setting-row label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #d4d4d8;
            margin-bottom: 0.4rem;
        }

        .setting-row input[type="text"],
        .setting-row input[type="number"],
        .setting-row textarea {
            width: 100%;
            background: var(--bg-base);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 0.6rem 0.75rem;
            color: var(--text-main);
            font-size: 0.875rem;
            transition: all 0.2s;
            font-family: inherit;
        }

        .setting-row input:focus,
        .setting-row textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        textarea#user-input {
            transition: height 0.1s ease;
        }
    </style>
</head>

<body class="h-screen overflow-hidden flex flex-col">
    <div class="flex h-full" id="main-interface">

        <aside class="w-64 bg-[#09090b] border-r border-[#27272a] flex flex-col flex-shrink-0 z-10">
            <div class="p-4 border-b border-[#27272a] flex justify-between items-center bg-[#09090b]">
                <h2 class="font-semibold text-sm tracking-wide text-zinc-100 uppercase">Sessions</h2>
                <button class="text-indigo-400 hover:text-indigo-300 transition-all p-1.5 rounded-md hover:bg-zinc-800"
                    id="new-session-btn" title="新建会话">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-3 space-y-1.5" id="session-list"></div>

            <div class="p-4 border-t border-[#27272a] bg-[#121214] flex items-center justify-between">
                <div class="flex items-center space-x-3 overflow-hidden">
                    <div
                        class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white text-sm font-bold shadow-[0_0_10px_rgba(79,70,229,0.4)] flex-shrink-0">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium text-zinc-200 truncate" id="current-user-display">Local User</p>
                    </div>
                </div>
                <button id="data-stats-btn"
                    class="text-zinc-400 hover:text-indigo-400 p-2 rounded-md hover:bg-zinc-800 transition-colors flex-shrink-0"
                    title="查看使用统计">
                    <i class="fa-solid fa-chart-pie"></i>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-[#09090b] relative">
            <header
                class="h-14 glass-panel flex items-center justify-between px-5 flex-shrink-0 z-40 absolute top-0 w-full">
                <div class="relative inline-block text-left">
                    <button type="button" id="model-dropdown-btn"
                        class="flex items-center space-x-2 px-3 py-1.5 rounded-md hover:bg-zinc-800 transition-colors focus:outline-none border border-transparent hover:border-zinc-700">
                        <span class="w-2 h-2 rounded-full bg-zinc-500 shadow-[0_0_8px_rgba(0,0,0,0.5)]"
                            id="connection-status-dot"></span>
                        <span class="text-sm font-medium text-zinc-300" id="model-name-display">加载模型中...</span>
                        <i class="fa-solid fa-chevron-down text-[10px] text-zinc-500 ml-1"></i>
                    </button>
                    <div id="model-dropdown-menu"
                        class="absolute left-0 mt-2 w-64 rounded-xl shadow-2xl bg-zinc-900 border border-zinc-800 hidden z-50 overflow-hidden">
                        <div class="py-1 max-h-60 overflow-y-auto" id="model-dropdown-list"></div>
                    </div>
                </div>
                <div class="flex items-center gap-5">
                    <div class="flex gap-2">
                        <button
                            class="w-8 h-8 flex items-center justify-center rounded-md text-purple-400 hover:text-white hover:bg-purple-500 transition-all"
                            id="summary-session-btn" title="生成记忆摘要">
                            <i class="fa-solid fa-brain"></i>
                        </button>
                        <button
                            class="w-8 h-8 flex items-center justify-center rounded-md text-rose-400 hover:text-white hover:bg-rose-500 transition-all"
                            id="clear-session-btn" title="清空上下文">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                    <div class="text-xs font-mono text-zinc-400 bg-zinc-900/80 px-2.5 py-1.5 rounded-md border border-zinc-800"
                        id="current-session-id-display">ID: -</div>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-4 pt-20 pb-4 space-y-6" id="messages-container">
                <div class="flex justify-center mt-20">
                    <div class="text-center text-zinc-600">
                        <i class="fa-solid fa-bolt text-5xl mb-4 opacity-40"></i>
                        <h3 class="text-lg font-medium text-zinc-400">Yauntyours WebUI</h3>
                        <p class="text-sm mt-1">准备就绪，开始对话。</p>
                    </div>
                </div>
            </div>

            <div class="p-4 bg-gradient-to-t from-[#09090b] via-[#09090b] to-transparent flex-shrink-0 pb-6">
                <div class="max-w-4xl mx-auto">
                    <div class="input-container rounded-xl flex flex-col overflow-hidden">
                        <div id="image-preview-container"
                            class="flex flex-wrap gap-2 px-3 pt-3 hidden border-b border-[#27272a]"></div>
                        <div class="relative flex items-end p-2">
                            <button class="text-zinc-400 hover:text-indigo-400 p-2.5 rounded-lg transition-colors"
                                id="attach-btn" title="上传文件/图片">
                                <i class="fa-solid fa-paperclip text-lg"></i>
                            </button>
                            <input type="file" id="file-upload" class="hidden" multiple>
                            <textarea
                                class="flex-1 bg-transparent text-zinc-100 p-2.5 resize-none focus:outline-none max-h-60 overflow-y-auto text-[0.95rem] leading-relaxed"
                                id="user-input" placeholder="输入消息... (Shift+Enter 换行)" rows="1"></textarea>
                            <button
                                class="text-white bg-indigo-600 hover:bg-indigo-500 p-2 rounded-lg transition-transform hover:scale-105 active:scale-95 m-1 shadow-[0_4px_14px_rgba(99,102,241,0.4)] disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center w-10 h-10"
                                id="send-btn" title="发送">
                                <i class="fa-solid fa-arrow-up"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex justify-between items-center mt-3 px-2">
                        <div class="flex items-center gap-2">
                            <div class="relative inline-block w-9 align-middle select-none">
                                <input
                                    class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-4 appearance-none cursor-pointer border-zinc-400 transition-all duration-300 left-0 top-0.5"
                                    id="think-toggle" name="toggle" type="checkbox">
                                <label
                                    class="toggle-label block overflow-hidden h-5 rounded-full bg-zinc-700 cursor-pointer transition-colors duration-300"
                                    for="think-toggle"></label>
                            </div>
                            <span class="text-xs font-medium text-zinc-400">深度思考模式</span>
                        </div>
                        <div class="text-xs text-zinc-600">Powered by Local Agent</div>
                    </div>
                </div>
            </div>
        </main>

        <aside class="w-80 bg-[#09090b] border-l border-[#27272a] flex flex-col flex-shrink-0 z-10">
            <div class="flex border-b border-[#27272a] bg-[#121214]">
                <button
                    class="flex-1 py-3 text-xs font-semibold uppercase tracking-wider text-indigo-400 border-b-2 border-indigo-500 focus:outline-none hover:bg-zinc-800 transition tab-btn"
                    data-tab="settings">配置</button>
                <button
                    class="flex-1 py-3 text-xs font-semibold uppercase tracking-wider text-zinc-500 hover:text-zinc-300 focus:outline-none hover:bg-zinc-800 transition border-b-2 border-transparent tab-btn"
                    data-tab="tools">工具</button>
                <button
                    class="flex-1 py-3 text-xs font-semibold uppercase tracking-wider text-zinc-500 hover:text-zinc-300 focus:outline-none hover:bg-zinc-800 transition border-b-2 border-transparent tab-btn"
                    data-tab="todos">任务</button>
                <button
                    class="flex-1 py-3 text-xs font-semibold uppercase tracking-wider text-zinc-500 hover:text-zinc-300 focus:outline-none hover:bg-zinc-800 transition border-b-2 border-transparent tab-btn"
                    data-tab="channels">频道</button>
            </div>

            <div class="tab-content flex-1 overflow-y-auto p-4" id="tab-settings">
                <div id="settings-form-container"></div>
                <div class="mt-4">
                    <button id="save-settings-btn"
                        class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2 px-4 rounded-lg transition-all flex items-center justify-center gap-2 shadow-md hover:shadow-indigo-500/30">
                        <i class="fa-solid fa-floppy-disk"></i> 应用配置
                    </button>
                </div>
                <div class="mt-8">
                    <h3
                        class="text-[0.65rem] font-bold text-zinc-500 uppercase tracking-widest mb-2 flex items-center gap-2">
                        <i class="fa-solid fa-terminal"></i> 系统日志
                    </h3>
                    <div class="bg-black border border-[#27272a] p-3 rounded-lg h-40 overflow-y-auto text-[0.7rem] font-mono text-zinc-400 space-y-1.5 shadow-inner"
                        id="system-logs">
                        <div class="text-emerald-500">[System] 核心初始化成功。</div>
                    </div>
                </div>
            </div>

            <div class="tab-content flex-1 overflow-y-auto p-4 hidden" id="tab-tools">
                <div class="space-y-3" id="tools-list"></div>
            </div>

            <div class="tab-content flex-1 overflow-y-auto p-4 hidden flex flex-col" id="tab-todos">
                <div class="flex mb-4 shadow-sm">
                    <input
                        class="flex-1 bg-[#18181b] border border-[#27272a] rounded-l-lg px-3 py-2 text-sm text-zinc-100 focus:outline-none focus:border-indigo-500 transition-colors"
                        id="new-todo-input" placeholder="新任务..." type="text" />
                    <button
                        class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-r-lg text-sm transition-colors"
                        id="add-todo-btn"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div class="space-y-2 flex-1" id="todos-list"></div>
            </div>

            <div class="tab-content flex-1 overflow-y-auto p-4 hidden" id="tab-channels">
                <div class="space-y-2" id="channels-list"></div>
            </div>
        </aside>
    </div>

    <div id="stats-modal"
        class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="bg-[#18181b] border border-[#27272a] rounded-xl shadow-2xl w-full max-w-2xl max-h-[80vh] flex flex-col transform scale-95 transition-transform duration-300"
            id="stats-modal-content">
            <div class="p-4 border-b border-[#27272a] flex justify-between items-center bg-[#121214] rounded-t-xl">
                <h2 class="font-semibold text-sm tracking-wide text-zinc-100 uppercase flex items-center gap-2">
                    <i class="fa-solid fa-chart-pie text-indigo-500"></i> 数据统计 (Tokens)
                </h2>
                <button id="close-stats-modal"
                    class="text-zinc-500 hover:text-zinc-300 transition-colors p-1 rounded hover:bg-zinc-800">
                    <i class="fa-solid fa-times text-lg"></i>
                </button>
            </div>
            <div class="p-6 overflow-y-auto flex-1 text-sm text-zinc-300 space-y-4" id="stats-container">
            </div>
        </div>
    </div>

    <div class="fixed top-5 right-5 z-50 flex flex-col space-y-3" id="toast-container"></div>

    <script>
        // ---------- 全局状态 ----------
        const state = {
            user: "Local User", sessions: [], currentSessionId: null, messages: [], settings: {}, models: [], currentModel: null,
            thinkMode: false, activeTab: 'settings', tools: [], todos: [], channels: [], isTyping: false, pendingImages: [],
        };

        const API_BASE = '/api';

        // ---------- DOM 元素缓存 ----------
        const els = {
            sessionList: document.getElementById('session-list'), newSessionBtn: document.getElementById('new-session-btn'),
            clearSessionBtn: document.getElementById('clear-session-btn'), summarySessionBtn: document.getElementById('summary-session-btn'),
            messagesContainer: document.getElementById('messages-container'), userInput: document.getElementById('user-input'),
            sendBtn: document.getElementById('send-btn'), thinkToggle: document.getElementById('think-toggle'),
            tabBtns: document.querySelectorAll('.tab-btn'), tabContents: document.querySelectorAll('.tab-content'),
            currentUserDisplay: document.getElementById('current-user-display'), systemLogs: document.getElementById('system-logs'),
            toolsList: document.getElementById('tools-list'), todosList: document.getElementById('todos-list'),
            newTodoInput: document.getElementById('new-todo-input'), addTodoBtn: document.getElementById('add-todo-btn'),
            channelsList: document.getElementById('channels-list'), currentSessionIdDisplay: document.getElementById('current-session-id-display'),
            modelDropdownBtn: document.getElementById('model-dropdown-btn'), modelDropdownMenu: document.getElementById('model-dropdown-menu'),
            modelDropdownList: document.getElementById('model-dropdown-list'), modelNameDisplay: document.getElementById('model-name-display'),
            connectionStatusDot: document.getElementById('connection-status-dot'), attachBtn: document.getElementById('attach-btn'),
            fileUpload: document.getElementById('file-upload'), imagePreviewContainer: document.getElementById('image-preview-container'),
            settingsFormContainer: document.getElementById('settings-form-container'), saveSettingsBtn: document.getElementById('save-settings-btn'),
            dataStatsBtn: document.getElementById('data-stats-btn'), statsModal: document.getElementById('stats-modal'),
            statsModalContent: document.getElementById('stats-modal-content'), closeStatsModalBtn: document.getElementById('close-stats-modal'),
            statsContainer: document.getElementById('stats-container')
        };

        // ---------- 工具函数 ----------
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            let icon = '<i class="fa-solid fa-circle-info text-blue-400"></i>';
            if (type === 'success') icon = '<i class="fa-solid fa-circle-check text-emerald-400"></i>';
            else if (type === 'error') icon = '<i class="fa-solid fa-circle-exclamation text-rose-400"></i>';

            toast.className = `bg-[#18181b] text-zinc-100 px-4 py-3 rounded-lg shadow-[0_4px_20px_rgba(0,0,0,0.5)] flex items-center space-x-3 min-w-[300px] toast-enter border border-[#27272a]`;
            toast.innerHTML = `${icon}<span class="text-sm font-medium">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s cubic-bezier(0.16, 1, 0.3, 1)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function log(msg, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.textContent = `[${time}] ${msg}`;

        // ---------- 文件上传 ----------
        els.attachBtn.onclick = () => els.fileUpload.click();
        function compressImage(file, maxResolution = 1024, quality = 0.8) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        let width = img.width, height = img.height;
                        if (width > maxResolution || height > maxResolution) {
                            if (width > height) { height = Math.round((height * maxResolution) / width); width = maxResolution; }
                            else { width = Math.round((width * maxResolution) / height); height = maxResolution; }
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = reject;
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        }
        els.fileUpload.onchange = async (e) => {
            const files = e.target.files;
            if (!files.length) return;
            for (const file of files) {
                if (file.type.startsWith('image/')) {
                    try { state.pendingImages.push(await compressImage(file, 1024, 0.8)); renderImagePreviews(); }
                    catch (err) { showToast("图片处理失败", "error"); }
                } else {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        els.userInput.value += (els.userInput.value.trim() ? '\n\n' : '') + `[File: ${file.name}]\n${event.target.result}`;
                        els.userInput.dispatchEvent(new Event('input'));
                    };
                    reader.readAsText(file);
                }
            }
            els.fileUpload.value = '';
        };
        function renderImagePreviews() {
            if (state.pendingImages.length === 0) { els.imagePreviewContainer.classList.add('hidden'); els.imagePreviewContainer.innerHTML = ''; return; }
            els.imagePreviewContainer.classList.remove('hidden');
            els.imagePreviewContainer.innerHTML = state.pendingImages.map((img, idx) =>
                `<div class="relative group mt-1 mb-2">

                    <button class="absolute -top-1.5 -right-1.5 bg-rose-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-[10px] opacity-0 group-hover:opacity-100 transition shadow-md hover:bg-rose-600"
                        onclick="removePendingImage(${idx})"><i class="fa-solid fa-times"></i></button>

        // ---------- 消息渲染 ----------
        function parseMessagesFromResponse(rawMessages) {
            if (!Array.isArray(rawMessages)) return [];
            const userName = state.settings.user_name || 'Admin';
            const agentName = state.settings.agent_name || 'agent';
            return rawMessages.map(msg => {
                let role = 'ai';
                if (msg.role === userName || msg.role === 'user' || msg.role === 'Admin') role = 'user';
                else if (msg.role === agentName || msg.role === 'assistant') role = 'ai';

                let content = ''; let images = [];
                if (typeof msg.content === 'string') content = msg.content;
                else if (Array.isArray(msg.content)) {
                    msg.content.forEach(part => {
                        if (part.type === 'text') content += part.text + '\n';
                        else if (part.type === 'image_url') {
                            const url = typeof part.image_url === 'string' ? part.image_url : part.image_url.url;
                            images.push(url);
                        }
                    });
                }
                return { role, content: content.trim(), images };
            });
        }

        function renderMessages() {
            els.messagesContainer.innerHTML = '';
            if (!state.messages.length) {
                els.messagesContainer.innerHTML = `<div class="flex justify-center mt-20"><div class="text-center text-zinc-600"><i class="fa-solid fa-comments text-5xl mb-4 opacity-40"></i><h3 class="text-lg font-medium text-zinc-400">上下文为空</h3><p class="text-sm mt-1">开始一段新对话吧。</p></div></div>`;
                return;
            }
            state.messages.forEach((msg, idx) => addMessageToUI(msg));
            els.messagesContainer.scrollTop = els.messagesContainer.scrollHeight;
        }

        function addMessageToUI(msg, id = null) {
            const div = document.createElement('div');
            div.className = `flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`;
            if (id) div.id = `msg-${id}`;

            const isUser = msg.role === 'user';
            const iconHTML = isUser ? '🌟' : '🐳';
            const iconBg = isUser ? 'bg-indigo-600 shadow-[0_0_10px_rgba(79,70,229,0.3)]' : 'bg-zinc-800 border border-zinc-700';
            const bubbleClass = isUser ? 'bg-indigo-600 text-white' : 'bg-[#18181b] border border-[#27272a] text-zinc-200';

            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = `${bubbleClass} px-4 py-3.5 rounded-2xl ${isUser ? 'rounded-br-sm' : 'rounded-bl-sm'} shadow-sm message-bubble overflow-hidden relative`;

            if (msg.isLoading) {
                bubbleDiv.innerHTML = '<span class="typing-cursor">思考中...</span>';
            } else {
                if (!isUser && msg.thinkings && msg.thinkings.length > 0) {
                    const details = document.createElement('details');
                    details.className = 'think-container';
                    const summary = document.createElement('summary');
                    summary.className = 'think-summary';
                    summary.innerHTML = '<i class="fa-solid fa-chevron-right"></i> <span>🧠 内心独白~💕</span>';
                    details.appendChild(summary);

                    const stepsDiv = document.createElement('div');
                    stepsDiv.className = 'think-steps';
                    msg.thinkings.forEach((step, idx) => {
                        const stepDiv = document.createElement('div');
                        stepDiv.className = 'think-step';
                        stepDiv.innerHTML = `<span class="think-step-marker">${idx + 1}</span><span>${escapeHtml(String(step)).replace(/\n/g, '<br>')}</span>`;
                        stepsDiv.appendChild(stepDiv);
                    });
                    details.appendChild(stepsDiv);
                    bubbleDiv.appendChild(details);
                }

                const proseDiv = document.createElement('div');
                proseDiv.className = 'prose prose-sm max-w-none text-zinc-200';
                proseDiv.innerHTML = isUser ? escapeHtml(msg.content).replace(/\n/g, '<br>') : marked.parse(renderFixCodeBlock(msg.content));
                attachCopyButtons(proseDiv);
                bubbleDiv.appendChild(proseDiv);

                if (msg.images && msg.images.length > 0) {
                    const imgDiv = document.createElement('div');
                    imgDiv.className = 'flex flex-wrap gap-2 mt-3 pt-3 border-t border-[#27272a]';
                    msg.images.forEach(img => {
                        const el = document.createElement('img');
                        el.src = img.startsWith('data:') ? img : 'data:image/jpeg;base64,' + img;
                        el.className = 'max-w-xs max-h-64 object-contain rounded-lg border border-zinc-600 cursor-pointer shadow-md hover:opacity-90 transition-opacity';
                        el.onclick = () => window.open(el.src);
                        imgDiv.appendChild(el);
                    });
                    bubbleDiv.appendChild(imgDiv);
                }

                if (!isUser && msg.usage) {
                    const usageDiv = document.createElement('div');
                    usageDiv.className = 'mt-3 pt-2 border-t border-[#27272a] text-[0.7rem] text-zinc-500 flex gap-4 font-mono select-none';
                    usageDiv.innerHTML = `
                        <span title="Prompt Tokens" class="flex items-center gap-1.5"><i class="fa-solid fa-arrow-right-to-bracket text-zinc-600"></i> ${msg.usage.prompt_cost || 0}</span>
                        <span title="Completion Tokens" class="flex items-center gap-1.5"><i class="fa-solid fa-arrow-right-from-bracket text-zinc-600"></i> ${msg.usage.completion_cost || 0}</span>
                        <span title="Total Tokens" class="text-indigo-400/90 flex items-center gap-1.5"><i class="fa-solid fa-coins"></i> ${msg.usage.total_cost || 0}</span>
                    `;

            row.className = `flex max-w-[85%] ${isUser ? 'flex-row-reverse space-x-reverse' : 'flex-row'} items-end space-x-3 min-w-0`;
            const avatar = document.createElement('div');
            avatar.className = `w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center text-zinc-100 ${iconBg} z-10 mb-1`;
            avatar.innerHTML = iconHTML;

            row.appendChild(avatar); row.appendChild(bubbleDiv); div.appendChild(row); els.messagesContainer.appendChild(div);
        }

        // ---------- 发送消息 ----------
        async function sendMessage() {
            const content = els.userInput.value.trim();
            const imagesToSend = [...state.pendingImages];
            if ((!content && imagesToSend.length === 0) || state.isTyping || !state.currentSessionId) return;

            const userMsg = { role: 'user', content, images: imagesToSend };
            state.messages.push(userMsg);
            els.userInput.value = ''; els.userInput.style.height = 'auto'; state.pendingImages = []; renderImagePreviews();

            const placeholder = { role: 'ai', content: '', images: [], thinkings: [], isLoading: true };
            state.messages.push(placeholder);
            const oldLength = state.messages.length;
            renderMessages();
            state.isTyping = true; els.sendBtn.disabled = true;

            try {
                const payload = { messages: content, model: state.currentModel || 'default', think: state.thinkMode, session_id: state.currentSessionId };
                if (imagesToSend.length) payload.images = imagesToSend;
                const res = await axios.post(API_BASE + '/input', payload);

                const newMessages = parseMessagesFromResponse(res.data.messages);
                const thinkArray = res.data?.thinkings || [];
                const addedMessages = newMessages.slice(oldLength - 2);
                const finalMessages = newMessages.slice(0, oldLength - 2).concat(addedMessages);

                if (thinkArray.length > 0) { for (let m of finalMessages) { if (m.role === 'ai') { m.thinkings = thinkArray; break; } } }
                if (res.data.usage) { for (let i = finalMessages.length - 1; i >= 0; i--) { if (finalMessages[i].role === 'ai') { finalMessages[i].usage = res.data.usage; break; } } }

                state.messages = finalMessages.filter(m => !m.isLoading);
                renderMessages();
                log('响应接收成功', 'success');
            } catch (error) {
                const errorMsg = error.response?.data?.error || error.message || '请求失败';
                state.messages = state.messages.filter(m => !m.isLoading);
                state.messages.push({ role: 'ai', content: `❌ 错误: ${errorMsg}`, images: [] });
                renderMessages(); log(`请求错误: ${errorMsg}`, 'error');
            } finally { state.isTyping = false; els.sendBtn.disabled = false; }
        }

        window.doneTodo = async function (id, isDone) { const todo = state.todos.find(t => t.id == id); if (todo) { todo.done = !isDone; await axios.post(API_BASE + `/todos/${id}`, todo); renderTodos(); } };

        };
        function renderTodos() {
            if (!state.todos?.length) { els.todosList.innerHTML = '<div class="text-zinc-600 text-sm p-4 text-center">暂无任务</div>'; return; }
            els.todosList.innerHTML = state.todos.map(t => `
                <div class="flex items-center justify-between bg-[#18181b] p-3 rounded-lg text-sm mb-2 border border-[#27272a] shadow-sm transition-all hover:border-zinc-700">
                    <div class="flex items-center gap-3 flex-1 cursor-pointer" onclick="doneTodo(${t.id}, ${t.done})">
                        <div class="w-5 h-5 rounded flex items-center justify-center transition-colors ${t.done ? 'bg-emerald-600 border-emerald-600' : 'border border-zinc-600 bg-zinc-900'}">
                            ${t.done ? '<i class="fa-solid fa-check text-xs text-white"></i>' : ''}
                        </div>
                        <p class="text-zinc-300 truncate ${t.done ? 'line-through opacity-50' : ''}">${escapeHtml(t.content)}</p>
                    </div>
                    <button onclick="event.stopPropagation(); deleteTodo(${t.id})" class="text-zinc-500 hover:text-rose-400 p-1.5 rounded transition-colors ml-2" title="删除"><i class="fa-solid fa-trash-can"></i></button>
                </div>`).join('');
        }

        async function loadChannels() { try { const res = await axios.get(API_BASE + '/channels'); state.channels = res.data || []; renderChannels(); } catch (e) { } }
        function renderChannels() { els.channelsList.innerHTML = state.channels.map(c => `<div class="p-3 hover:bg-[#18181b] rounded-lg border border-transparent hover:border-[#27272a] cursor-pointer text-sm font-medium text-zinc-300 transition-colors flex items-center gap-2" onclick="switchSession('${c.name}')"><i class="fa-solid fa-hashtag text-zinc-600"></i> ${c.name}</div>`).join(''); }

        // ---------- 数据可视化统计 (Bug Fix) ----------
        els.dataStatsBtn.onclick = async () => {
            els.statsModal.classList.remove('hidden'); void els.statsModal.offsetWidth;
            els.statsModal.classList.remove('opacity-0'); els.statsModalContent.classList.remove('scale-95');
            els.statsContainer.innerHTML = '<div class="flex justify-center py-10"><i class="fa-solid fa-spinner fa-spin text-2xl text-indigo-500"></i></div>';

            try { const res = await axios.get(API_BASE + '/data'); renderStats(res.data?.usages || {}); }
            catch (error) { els.statsContainer.innerHTML = '<div class="text-rose-400 text-center py-10">获取数据失败</div>'; }
        };

        function closeStatsModal() {
            els.statsModal.classList.add('opacity-0'); els.statsModalContent.classList.add('scale-95');
            setTimeout(() => els.statsModal.classList.add('hidden'), 300);
        }
        els.closeStatsModalBtn.onclick = closeStatsModal;
        els.statsModal.onclick = (e) => { if (e.target === els.statsModal) closeStatsModal(); }

        // 彻底修复了对 undefined 或 null 取值的报错逻辑
        function renderStats(usages) {
            if (!usages || Object.keys(usages).length === 0) {
                els.statsContainer.innerHTML = '<div class="text-zinc-500 text-center py-10">暂无使用数据</div>';
                return;
            }

            let maxTotal = 0;
            let totalOverall = 0;
            const dataArr = [];

            for (const [key, val] of Object.entries(usages)) {
                // 安全获取属性，默认值为 0
                const pCost = val.prompt_cost || 0;
                const cCost = val.completion_cost || 0;
                const tCost = val.total_cost || (pCost + cCost);

                if (tCost > maxTotal) maxTotal = tCost;
                totalOverall += tCost;

                dataArr.push({ name: key, prompt_cost: pCost, completion_cost: cCost, total_cost: tCost });
            }

            dataArr.sort((a, b) => b.total_cost - a.total_cost);

            let html = `
                <div class="grid grid-cols-1 mb-6">
                    <div class="bg-[#18181b] border border-[#27272a] rounded-xl p-5 flex flex-col items-center justify-center shadow-inner">
                        <span class="text-zinc-500 text-xs mb-2 uppercase tracking-wider font-semibold">系统总计消耗 Tokens</span>
                        <span class="text-4xl font-mono text-indigo-400 font-bold drop-shadow-[0_2px_10px_rgba(99,102,241,0.2)]">${totalOverall.toLocaleString()}</span>
                    </div>
                </div>
                <div class="space-y-4">
            `;

            dataArr.forEach(item => {
                const pct = maxTotal > 0 ? (item.total_cost / maxTotal) * 100 : 0;
                const promptPct = item.total_cost > 0 ? (item.prompt_cost / item.total_cost) * 100 : 0;
                const compPct = item.total_cost > 0 ? (item.completion_cost / item.total_cost) * 100 : 0;

                html += `
                    <div class="bg-[#09090b] border border-[#27272a] rounded-lg p-4 hover:border-zinc-700 transition-colors shadow-sm">
                        <div class="flex justify-between items-center mb-3">
                            <span class="font-medium text-zinc-200 text-sm flex items-center"><i class="fa-solid fa-hashtag text-zinc-600 mr-2 text-xs"></i>${escapeHtml(item.name)}</span>
                            <span class="font-mono text-sm text-zinc-300 font-semibold">${item.total_cost.toLocaleString()}</span>
                        </div>
                        <div class="w-full bg-zinc-800 rounded-full h-2.5 mb-3 overflow-hidden shadow-inner">
                            <div class="flex h-full transition-all duration-500 ease-out" style="width: ${pct}%">
                                <div class="bg-indigo-500 h-full" style="width: ${promptPct}%" title="Prompt: ${item.prompt_cost}"></div>
                                <div class="bg-purple-500 h-full" style="width: ${compPct}%" title="Completion: ${item.completion_cost}"></div>
                            </div>
                        </div>
                        <div class="flex justify-between text-[0.7rem] font-mono text-zinc-400">
                            <span class="flex items-center gap-1"><span class="inline-block w-2.5 h-2.5 rounded-full bg-indigo-500 shadow-sm"></span>Prompt: ${item.prompt_cost.toLocaleString()}</span>
                            <span class="flex items-center gap-1"><span class="inline-block w-2.5 h-2.5 rounded-full bg-purple-500 shadow-sm"></span>Completion: ${item.completion_cost.toLocaleString()}</span>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            els.statsContainer.innerHTML = html;
        }

        // ---------- 事件绑定与初始化 ----------
        els.thinkToggle.onchange = (e) => state.thinkMode = e.target.checked;
        els.newSessionBtn.onclick = newSession;
        els.clearSessionBtn.onclick = clearCurrentSession;
        els.summarySessionBtn.onclick = generateSessionSummary;

        els.tabBtns.forEach(btn => {
            btn.onclick = () => {
                els.tabBtns.forEach(b => { b.classList.replace('text-indigo-400', 'text-zinc-500'); b.classList.remove('border-indigo-500'); b.classList.add('border-transparent'); });
                btn.classList.replace('text-zinc-500', 'text-indigo-400'); btn.classList.remove('border-transparent'); btn.classList.add('border-indigo-500');
                els.tabContents.forEach(c => c.classList.add('hidden')); document.getElementById(`tab-${btn.dataset.tab}`).classList.remove('hidden');
            };
        });

        els.userInput.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
        els.sendBtn.onclick = sendMessage;
        els.modelDropdownBtn.onclick = (e) => { e.stopPropagation(); els.modelDropdownMenu.classList.toggle('hidden'); };
        document.addEventListener('click', () => els.modelDropdownMenu.classList.add('hidden'));

        async function init() {
            await loadSettings(); await getModels(); await loadSessions(); await loadTools(); await loadTodos(); await loadChannels();
            els.saveSettingsBtn.onclick = saveSettings;
            state.user = state.settings.user_name || state.user; els.currentUserDisplay.textContent = state.user;
            document.title = state.user + " · Chat WebUI · 深度思考";
        }
        init();
    </script>
</body>

</html>
