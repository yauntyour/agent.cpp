name: Build and Release
on:
  push:
    tags:
      - "v*"
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        include:
          - os: ubuntu-latest
            artifact_name: agent-cpp-linux
            asset_suffix: .tar.gz
          - os: windows-latest
            artifact_name: agent-cpp-windows
            asset_suffix: .zip
          - os: macos-latest
            artifact_name: agent-cpp-macos
            asset_suffix: .tar.gz

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ---------- Linux ----------
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libboost-system-dev

      # ---------- macOS ----------
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install curl boost
          echo "Boost_ROOT=$(brew --prefix boost)" >> $GITHUB_ENV

      # ---------- Windows (改用 MSYS2) ----------
      - name: Setup MSYS2 and install dependencies (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja
            mingw-w64-x86_64-curl mingw-w64-x86_64-boost

      # ---------- CMake 配置 ----------
      - name: Configure CMake (Windows MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          mkdir build
          cd build
          cmake .. -G "Ninja" -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release

      # ---------- 编译 ----------
      - name: Build (Windows MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --build build --parallel

      - name: Build (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: cmake --build build --config Release --parallel

      # ---------- 安装 ----------
      - name: Install (staging)
        shell: bash
        run: cmake --install build --prefix install

      # ---------- 打包 ----------
      - name: Package with CPack (Windows MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cd build
          cpack -G ZIP

      - name: Package with CPack (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd build
          cpack -G TGZ

      # ---------- 识别包文件名 ----------
      - name: Determine package file name
        id: package
        shell: bash
        run: |
          cd build
          PKG_FILE=$(ls *${{ matrix.asset_suffix }} | head -1)
          echo "pkg_file=$PKG_FILE" >> $GITHUB_OUTPUT
          echo "pkg_path=build/$PKG_FILE" >> $GITHUB_OUTPUT

      # ---------- 上传工件 ----------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ steps.package.outputs.pkg_path }}

      # ---------- 发布到 Release ----------
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ steps.package.outputs.pkg_path }}
          asset_name: ${{ matrix.artifact_name }}-${{ github.ref_name }}${{
            matrix.asset_suffix }}
          tag: ${{ github.ref }}
          overwrite: true
