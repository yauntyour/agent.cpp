name: Build and Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        include:
          - os: ubuntu-latest
            artifact_name: agent-cpp-linux
            asset_suffix: .tar.gz
          - os: windows-latest
            artifact_name: agent-cpp-windows
            asset_suffix: .zip
          - os: macos-latest
            artifact_name: agent-cpp-macos
            asset_suffix: .tar.gz

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ---------- Linux 依赖 ----------
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libboost-system-dev

      # ---------- macOS 依赖 ----------
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install curl boost
          # 显式设置 Boost_ROOT，帮助 CMake 找到 Homebrew 安装的 Boost
          echo "Boost_ROOT=$(brew --prefix boost)" >> $GITHUB_ENV

      # ---------- Windows 依赖（通过 vcpkg 清单）----------
      - name: Setup vcpkg and install dependencies (Windows)
        if: runner.os == 'Windows'
        uses: lukka/run-vcpkg@v11
        with:
          # 将 vcpkg 安装在工作区目录下
          vcpkgDirectory: "${{ github.workspace }}/vcpkg"
          # 可选的固定 commit ID（建议使用稳定版本）
          # 若不指定，默认使用最新版本
          vcpkgGitCommitId: "b02e1c6e5b1b2a0e2e5e0e8f9f1e2e3e4e5e6e7e"

      # ---------- CMake 配置 ----------
      - name: Configure CMake
        run: |
          mkdir build
          cd build
          # 在 Windows 上 run-vcpkg 会自动设置 CMAKE_TOOLCHAIN_FILE 环境变量
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="${{ env.CMAKE_TOOLCHAIN_FILE }}"
        shell: bash

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install (staging)
        run: cmake --install build --prefix install

      # ---------- 打包 ----------
      - name: Package with CPack
        run: |
          cd build
          cpack -G ${{ matrix.os == 'windows-latest' && 'ZIP' || 'TGZ' }}
        shell: bash

      # ---------- 确定生成的包文件名 ----------
      - name: Determine package file name
        id: package
        shell: bash
        run: |
          cd build
          # 匹配扩展名为 asset_suffix 的文件（通常只有一个）
          PKG_FILE=$(ls *${{ matrix.asset_suffix }} | head -1)
          echo "pkg_file=$PKG_FILE" >> $GITHUB_OUTPUT
          echo "pkg_path=build/$PKG_FILE" >> $GITHUB_OUTPUT

      # ---------- 上传工件（用于工作流内部）----------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ steps.package.outputs.pkg_path }}

      # ---------- 上传到 GitHub Release ----------
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ steps.package.outputs.pkg_path }}
          asset_name: ${{ matrix.artifact_name }}-${{ github.ref_name }}${{
            matrix.asset_suffix }}
          tag: ${{ github.ref }}
          overwrite: true
