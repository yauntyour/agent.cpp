name: Build and Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [ published ]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" # 每天 UTC 0:00

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        include:
          - os: ubuntu-latest
            artifact_name: agent-cpp-linux
            asset_suffix: .tar.gz
            executable_name: agent-cpp-linux
          - os: windows-latest
            artifact_name: agent-cpp-windows
            asset_suffix: .zip
            executable_name: agent-cpp-windows.exe
          - os: macos-latest
            artifact_name: agent-cpp-macos
            asset_suffix: .tar.gz
            executable_name: agent-cpp-macos

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      # ---------- Linux 依赖 ----------
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libboost-dev

      # ---------- macOS 依赖 ----------
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake ninja curl boost

      # ---------- Windows (MSYS2) 依赖 ----------
      - name: Setup MSYS2 and install dependencies (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja
            mingw-w64-x86_64-curl mingw-w64-x86_64-boost

      # ---------- CMake 配置 ----------
      - name: Configure CMake (Windows MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          mkdir build
          cd build
          cmake .. -G "Ninja" -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release

      # ---------- 编译 ----------
      - name: Build (Windows MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --build build --parallel

      - name: Build (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: cmake --build build --config Release --parallel

      # ---------- 安装 ----------
      - name: Install (staging)
        shell: bash
        run: cmake --install build --prefix install

      # ---------- 打包 ----------
      - name: Package with CPack (Windows MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cd build
          cpack -G ZIP

      - name: Package with CPack (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd build
          cpack -G TGZ

      # ---------- 重命名 Nightly 包（去掉版本号） ----------
      - name: Rename package for Nightly (Windows MSYS2)
        if: (github.event_name == 'schedule' || github.event_name ==
          'workflow_dispatch') && runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cd build
          OLD_NAME=$(ls *${{ matrix.asset_suffix }} | head -1)
          NEW_NAME="${{ matrix.artifact_name }}${{ matrix.asset_suffix }}"
          mv "$OLD_NAME" "$NEW_NAME"
          echo "Renamed $OLD_NAME -> $NEW_NAME"

      - name: Rename package for Nightly (Unix)
        if: (github.event_name == 'schedule' || github.event_name ==
          'workflow_dispatch') && runner.os != 'Windows'
        shell: bash
        run: |
          cd build
          OLD_NAME=$(ls *${{ matrix.asset_suffix }} | head -1)
          NEW_NAME="${{ matrix.artifact_name }}${{ matrix.asset_suffix }}"
          mv "$OLD_NAME" "$NEW_NAME"
          echo "Renamed $OLD_NAME -> $NEW_NAME"

      # ---------- 确定最终包名 ----------
      - name: Determine package file name
        id: package
        shell: bash
        run: |
          cd build
          # Nightly 事件下已经是固定名称，Stable 事件则自动检测
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PKG_FILE="${{ matrix.artifact_name }}${{ matrix.asset_suffix }}"
          else
            PKG_FILE=$(ls *${{ matrix.asset_suffix }} | head -1)
          fi
          echo "pkg_file=$PKG_FILE" >> $GITHUB_OUTPUT
          echo "pkg_path=build/$PKG_FILE" >> $GITHUB_OUTPUT

      # ---------- 准备单独的可执行文件 ----------
      - name: Prepare executable artifact
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            SRC="install/app.exe"
          else
            SRC="install/app"
          fi
          DST="${{ matrix.executable_name }}"
          cp "$SRC" "$DST"
          if [ "$RUNNER_OS" != "Windows" ]; then
            chmod +x "$DST"
          fi
          echo "exec_path=$DST" >> $GITHUB_OUTPUT

      - name: Upload executable artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}-executable
          path: ${{ matrix.executable_name }}

      # ---------- 上传压缩包 ----------
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ steps.package.outputs.pkg_path }}

  release-nightly:
    name: Create Nightly Release
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -R artifacts

      - name: Create or update Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: nightly
          name: agent.cpp Nightly Build
          body: release.md
          files: artifacts/**/*
          fail_on_unmatched_files: true
          overwrite: false