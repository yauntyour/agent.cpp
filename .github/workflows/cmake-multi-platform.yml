name: Build and Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        include:
          - os: ubuntu-latest
            artifact_name: agent-cpp-linux
            asset_suffix: .tar.gz
          - os: windows-latest
            artifact_name: agent-cpp-windows
            asset_suffix: .zip
          - os: macos-latest
            artifact_name: agent-cpp-macos
            asset_suffix: .tar.gz

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ---------- Linux ----------
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libboost-system-dev

      # ---------- macOS ----------
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install curl boost
          # 设置 Boost_ROOT 供 FindBoost 模块使用
          echo "Boost_ROOT=$(brew --prefix boost)" >> $GITHUB_ENV

      # ---------- Windows ----------
      - name: Setup vcpkg and install dependencies (Windows)
        if: runner.os == 'Windows'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: "${{ github.workspace }}/vcpkg"
          # 不指定 commit 则使用 master 分支最新版（稳定可用）
          # vcpkgGitCommitId: 'fba12d1cd4c83e2c8e5b9e5c5e8e9e1e2e3e4e5e6'  # 如需固定版本，填入真实 hash

          # ---------- CMake 配置 ----------
      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="${{ env.CMAKE_TOOLCHAIN_FILE }}"
        shell: bash

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install (staging)
        run: cmake --install build --prefix install

      # ---------- 打包 ----------
      - name: Package with CPack
        run: |
          cd build
          cpack -G ${{ matrix.os == 'windows-latest' && 'ZIP' || 'TGZ' }}
        shell: bash

      # ---------- 识别包文件名 ----------
      - name: Determine package file name
        id: package
        shell: bash
        run: |
          cd build
          PKG_FILE=$(ls *${{ matrix.asset_suffix }} | head -1)
          echo "pkg_file=$PKG_FILE" >> $GITHUB_OUTPUT
          echo "pkg_path=build/$PKG_FILE" >> $GITHUB_OUTPUT

      # ---------- 上传工件 ----------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ steps.package.outputs.pkg_path }}

      # ---------- 发布到 Release ----------
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ steps.package.outputs.pkg_path }}
          asset_name: ${{ matrix.artifact_name }}-${{ github.ref_name }}${{
            matrix.asset_suffix }}
          tag: ${{ github.ref }}
          overwrite: true
