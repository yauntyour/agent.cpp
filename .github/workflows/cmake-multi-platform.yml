name: Build and Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [ published ]
  workflow_dispatch:
  schedule:
    # 新增定时触发器
    - cron: "0 0 * * *" # 每天 UTC 0:00

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        include:
          - os: ubuntu-latest
            artifact_name: agent-cpp-linux
            asset_suffix: .tar.gz
          - os: windows-latest
            artifact_name: agent-cpp-windows
            asset_suffix: .zip
          - os: macos-latest
            artifact_name: agent-cpp-macos
            asset_suffix: .tar.gz

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ... (各平台依赖安装、配置、编译、打包步骤保持不变) ...

      - name: Determine package file name
        id: package
        shell: bash
        run: |
          cd build
          PKG_FILE=$(ls *${{ matrix.asset_suffix }} | head -1)
          echo "pkg_file=$PKG_FILE" >> $GITHUB_OUTPUT
          echo "pkg_path=build/$PKG_FILE" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ steps.package.outputs.pkg_path }}

      # ---------- 稳定版 Release（标签推送） ----------
      - name: Release (Stable)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: agent.cpp ${{ github.ref_name }}
          body_path: release.md
          files: ${{ steps.package.outputs.pkg_path }}
          fail_on_unmatched_files: true

      # ---------- Nightly 版 Release（定时或手动触发） ----------
      - name: Release (Nightly)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: nightly
          name: agent.cpp Nightly Build
          body: |
            Automated nightly build from commit ${{ github.sha }}.
            Built on ${{ matrix.os }}.
          prerelease: true
          files: ${{ steps.package.outputs.pkg_path }}
          fail_on_unmatched_files: true
